<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaya - Narrative Game Prototype</title>
    <meta name="description" content="2D narrative game prototype - player movement system">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas" width="960" height="540"></canvas>
        <div id="controls-overlay">
            <div class="control-hint">
                <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
                <span class="label">or</span>
                <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
                <span class="label">Move</span>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
